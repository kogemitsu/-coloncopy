<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ID/PW & カード コピーツール（iPhone対応）</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 16px; background:#fafafa; margin:0; padding-bottom: 60px; }
  h3 { margin: 0 0 10px; font-size:18px; }
  textarea { width:100%; font-family: ui-monospace; font-size:14px; margin-top:10px; box-sizing:border-box; }
  .toolbar { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
  .toolbar button { flex:1; font-size:14px; padding:6px; border-radius:6px; }
  #list { margin-top:12px; }
  .row { display:grid; grid-template-columns: 26px 1fr auto; gap:8px; align-items:center;
         padding:8px 10px; border-bottom:1px solid #ddd; background:#fff; border-radius:8px; margin-bottom:6px; }
  .meta { font-size:14px; word-break:break-all; line-height: 1.4; }
  .buttons { display:flex; gap:4px; flex-wrap:wrap; justify-content:flex-end; max-width: 130px; }
  button.copy { font-size:12px; padding:4px 6px; border:1px solid #ccc; border-radius:6px; background:#f7f7f7; white-space:nowrap; }
  button.copy:active { background:#e0e0e0; }
  input[type="checkbox"] { transform: scale(1.2); }

  /* 検索機能のフローティングUI */
  #search-container {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    align-items: center;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 24px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    padding: 4px;
    z-index: 1000;
  }
  #search-input {
    width: 0;
    border: none;
    outline: none;
    padding: 0;
    background: transparent;
    font-size: 16px;
    transition: width 0.3s, padding 0.3s;
  }
  #search-container.active #search-input {
    width: 180px;
    padding: 0 10px;
  }
  #search-btn {
    background: none;
    border: none;
    font-size: 18px;
    padding: 6px;
    cursor: pointer;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
</style>
</head>
<body>

<h3>ID / パスワード & カード コピー</h3>

<textarea id="input" placeholder="id:password または 番号:期限:CVV を改行区切りで貼り付け" rows="4"></textarea>
<div class="toolbar">
  <button id="addBtn">追加</button>
  <button id="clearBtn">クリア</button>
</div>

<div id="list"></div>

<div id="search-container">
  <input type="text" id="search-input" placeholder="検索...">
  <button id="search-btn">🔍</button>
</div>

<script>
let items = [];
const KEY = 'coloncopy.items.v2';

function save(){ localStorage.setItem(KEY, JSON.stringify(items)); }

// 過去のID/PWのみのデータフォーマットと互換性を持たせてロード
function load(){
  try{ 
    const loaded = JSON.parse(localStorage.getItem(KEY)||'[]'); 
    items = loaded.map(it => {
      // 古い形式のデータがあれば新しい形式（type属性付き）に変換
      if (it.idtxt !== undefined) {
        return { type: 'idpw', p1: it.idtxt, p2: it.pwtxt, checked: it.checked || false };
      }
      return it;
    });
  }
  catch(e){ items=[]; }
}

function copyText(txt){
  navigator.clipboard.writeText(txt).then(()=>alert(`コピーしました: ${txt}`))
  .catch(()=>alert('コピーできません（Safari設定を確認）'));
}

// 検索文字列を受け取ってフィルタリング表示
function render(query = ''){
  const list = document.getElementById('list');
  list.innerHTML = '';
  const q = query.toLowerCase().trim();

  // 検索クエリで絞り込み
  const filtered = items.filter(it => {
    if(!q) return true;
    const textToSearch = it.type === 'card' ? `${it.p1} ${it.p2} ${it.p3}` : `${it.p1} ${it.p2}`;
    return textToSearch.toLowerCase().includes(q);
  });

  if(!filtered.length){
    list.innerHTML = '<p style="color:#666;">データがありません。</p>';
    return;
  }

  for(const it of filtered){
    const row = document.createElement('div');
    row.className='row';

    const cb = document.createElement('input');
    cb.type='checkbox';
    cb.checked = it.checked;
    cb.addEventListener('change', ()=>{ it.checked = cb.checked; save(); });
    row.appendChild(cb);

    const meta = document.createElement('div');
    meta.className='meta';
    if (it.type === 'card') {
      meta.innerHTML = `<b>番号:</b> ${it.p1}<br><b>期限:</b> ${it.p2}<br><b>CVV:</b> ${it.p3}`;
    } else {
      meta.innerHTML = `<b>ID:</b> ${it.p1}<br><b>PW:</b> ${it.p2}`;
    }
    row.appendChild(meta);

    const btns = document.createElement('div');
    btns.className='buttons';

    // タイプに応じてコピーボタンを生成
    if (it.type === 'card') {
      const btn1=document.createElement('button'); btn1.textContent='番号'; btn1.className='copy'; btn1.onclick=()=>copyText(it.p1); btns.appendChild(btn1);
      const btn2=document.createElement('button'); btn2.textContent='期限'; btn2.className='copy'; btn2.onclick=()=>copyText(it.p2); btns.appendChild(btn2);
      const btn3=document.createElement('button'); btn3.textContent='CVV'; btn3.className='copy'; btn3.onclick=()=>copyText(it.p3); btns.appendChild(btn3);
    } else {
      const idBtn=document.createElement('button'); idBtn.textContent='ID'; idBtn.className='copy'; idBtn.onclick=()=>copyText(it.p1); btns.appendChild(idBtn);
      const pwBtn=document.createElement('button'); pwBtn.textContent='PW'; pwBtn.className='copy'; pwBtn.onclick=()=>copyText(it.p2); btns.appendChild(pwBtn);
    }

    row.appendChild(btns);
    list.appendChild(row);
  }
}

document.getElementById('addBtn').onclick=()=>{
  const val=document.getElementById('input').value.trim();
  if(!val){ alert('データを入力してください'); return; }
  
  const lines=val.split('\n').filter(l=>l.includes(':'));
  for(const line of lines){
    const parts = line.split(':').map(p=>p.trim());
    
    // コロンが2つ以上（カード情報）の場合
    if(parts.length >= 3){
      items.push({ type: 'card', p1: parts[0], p2: parts[1], p3: parts.slice(2).join(':'), checked: false });
    } 
    // コロンが1つ（ID:PW）の場合
    else if(parts.length === 2){
      if(parts[0] && parts[1]) items.push({ type: 'idpw', p1: parts[0], p2: parts[1], checked: false });
    }
  }
  save(); 
  // 検索状態をリセットして再描画
  document.getElementById('search-input').value = '';
  document.getElementById('search-container').classList.remove('active');
  render();
  document.getElementById('input').value='';
};

document.getElementById('clearBtn').onclick=()=>{
  if(confirm('全て削除しますか？')){ items=[]; save(); render(); }
};

// 検索UIの制御
const searchContainer = document.getElementById('search-container');
const searchInput = document.getElementById('search-input');
const searchBtn = document.getElementById('search-btn');

searchBtn.onclick = () => {
  searchContainer.classList.toggle('active');
  if (searchContainer.classList.contains('active')) {
    searchInput.focus();
  } else {
    searchInput.value = '';
    render(); 
  }
};

searchInput.addEventListener('input', (e) => {
  render(e.target.value);
});

// 初期読み込み
load(); 
render();
</script>

</body>
</html>
